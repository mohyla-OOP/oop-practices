repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.7
    hooks:
      - id: clang-format
        args:
          - -i
          - --style=file:./.clang-format
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
    - id: cmake-format
      additional_dependencies:
        - pyyaml
      args:
        - -i
        - --config-file=.cmake-format.yaml
    - id: cmake-lint
      additional_dependencies:
        - pyyaml
      args:
        - --config-file=.cmake-format.yaml